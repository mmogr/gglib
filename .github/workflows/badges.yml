          generate_file_badge "gglib-core" "contracts/http/hf.rs" "contracts-http-hf"
          
          # gglib-core domain files
          generate_file_badge "gglib-core" "domain/chat.rs" "domain-chat"
          generate_file_badge "gglib-core" "domain/gguf.rs" "domain-gguf"
          generate_file_badge "gglib-core" "domain/model.rs" "domain-model"
          generate_file_badge "gglib-core" "domain/mcp/types.rs" "domain-mcp-types"
          
          # gglib-core download files
          generate_file_badge "gglib-core" "download/errors.rs" "download-errors"
          generate_file_badge "gglib-core" "download/events.rs" "download-events"
          generate_file_badge "gglib-core" "download/queue.rs" "download-queue"
          generate_file_badge "gglib-core" "download/types.rs" "download-types"
          
          # gglib-core events files
          generate_file_badge "gglib-core" "events/app.rs" "events-app"
          generate_file_badge "gglib-core" "events/download.rs" "events-download"
          generate_file_badge "gglib-core" "events/mcp.rs" "events-mcp"
          generate_file_badge "gglib-core" "events/server.rs" "events-server"
          
          # gglib-core paths files
          generate_file_badge "gglib-core" "paths/config.rs" "paths-config"
          generate_file_badge "gglib-core" "paths/database.rs" "paths-database"
          generate_file_badge "gglib-core" "paths/ensure.rs" "paths-ensure"
          generate_file_badge "gglib-core" "paths/error.rs" "paths-error"
          generate_file_badge "gglib-core" "paths/llama.rs" "paths-llama"
          generate_file_badge "gglib-core" "paths/models.rs" "paths-models"
          generate_file_badge "gglib-core" "paths/platform.rs" "paths-platform"
          generate_file_badge "gglib-core" "paths/resolver.rs" "paths-resolver"
          generate_file_badge "gglib-core" "paths/test_utils.rs" "paths-test_utils"
          
          # gglib-core ports files
          generate_file_badge "gglib-core" "ports/chat_history.rs" "ports-chat_history"
          generate_file_badge "gglib-core" "ports/download.rs" "ports-download"
          generate_file_badge "gglib-core" "ports/download_event_emitter.rs" "ports-download_event_emitter"
          generate_file_badge "gglib-core" "ports/download_manager.rs" "ports-download_manager"
          generate_file_badge "gglib-core" "ports/download_state.rs" "ports-download_state"
          generate_file_badge "gglib-core" "ports/event_emitter.rs" "ports-event_emitter"
          generate_file_badge "gglib-core" "ports/gguf_parser.rs" "ports-gguf_parser"
          generate_file_badge "gglib-core" "ports/mcp_error.rs" "ports-mcp_error"
          generate_file_badge "gglib-core" "ports/mcp_repository.rs" "ports-mcp_repository"
          generate_file_badge "gglib-core" "ports/model_catalog.rs" "ports-model_catalog"
          generate_file_badge "gglib-core" "ports/model_registrar.rs" "ports-model_registrar"
          generate_file_badge "gglib-core" "ports/model_repository.rs" "ports-model_repository"
          generate_file_badge "gglib-core" "ports/model_runtime.rs" "ports-model_runtime"
          generate_file_badge "gglib-core" "ports/process_runner.rs" "ports-process_runner"
          generate_file_badge "gglib-core" "ports/server_health.rs" "ports-server_health"
          generate_file_badge "gglib-core" "ports/server_log_sink.rs" "ports-server_log_sink"
          generate_file_badge "gglib-core" "ports/settings_repository.rs" "ports-settings_repository"
          generate_file_badge "gglib-core" "ports/system_probe.rs" "ports-system_probe"
          generate_file_badge "gglib-core" "ports/tool_support.rs" "ports-tool_support"
          generate_file_badge "gglib-core" "ports/huggingface/client.rs" "ports-huggingface-client"
          generate_file_badge "gglib-core" "ports/huggingface/error.rs" "ports-huggingface-error"
          generate_file_badge "gglib-core" "ports/huggingface/types.rs" "ports-huggingface-types"
          
          # gglib-core services files
          generate_file_badge "gglib-core" "services/app_core.rs" "services-app_core"
          generate_file_badge "gglib-core" "services/chat_history.rs" "services-chat_history"
          generate_file_badge "gglib-core" "services/model_registrar.rs" "services-model_registrar"
          generate_file_badge "gglib-core" "services/model_service.rs" "services-model_service"
          generate_file_badge "gglib-core" "services/server_service.rs" "services-server_service"
          generate_file_badge "gglib-core" "services/settings_service.rs" "services-settings_service"
          
          # gglib-core utils files
          generate_file_badge "gglib-core" "utils/validation.rs" "utils-validation"
          generate_file_badge "gglib-core" "utils/system/types.rs" "utils-system-types"
          
          echo "Generated file-level LOC and complexity badges"
          
          # =============================================================================
          # TypeScript module badges
          # =============================================================================
          for MODULE in components hooks contexts services utils commands; do
            if [ -d "src/$MODULE" ]; then
              TS_DATA=$(scc "src/$MODULE" --include-ext ts,tsx --format json 2>/dev/null)
              TS_LOC=$(echo "$TS_DATA" | jq '[.[] | select(.Name == "TypeScript" or .Name == "TypeScript JSX")] | map(.Code) | add // 0')
              TS_COMPLEXITY=$(echo "$TS_DATA" | jq '[.[] | select(.Name == "TypeScript" or .Name == "TypeScript JSX")] | map(.Complexity) | add // 0')
              
              if [ "$TS_LOC" -lt 500 ]; then TS_LOC_COL="brightgreen";
              elif [ "$TS_LOC" -lt 1000 ]; then TS_LOC_COL="green";
              elif [ "$TS_LOC" -lt 2000 ]; then TS_LOC_COL="yellowgreen";
              else TS_LOC_COL="yellow"; fi
              
              if [ "$TS_COMPLEXITY" -lt 20 ]; then TS_CX_COL="brightgreen";
              elif [ "$TS_COMPLEXITY" -lt 50 ]; then TS_CX_COL="green";
              elif [ "$TS_COMPLEXITY" -lt 100 ]; then TS_CX_COL="yellowgreen";
              else TS_CX_COL="yellow"; fi
              
              echo "{\"schemaVersion\":1,\"label\":\"loc\",\"message\":\"$TS_LOC\",\"color\":\"$TS_LOC_COL\"}" > "badges/ts-$MODULE-loc.json"
              echo "{\"schemaVersion\":1,\"label\":\"complexity\",\"message\":\"$TS_COMPLEXITY\",\"color\":\"$TS_CX_COL\"}" > "badges/ts-$MODULE-complexity.json"
              echo "  src/$MODULE: $TS_LOC loc, $TS_COMPLEXITY complexity"
            fi
          done
          
          # TypeScript aggregate LOC and complexity
          TS_DATA=$(scc src --include-ext ts,tsx --format json 2>/dev/null)
          TS_LOC=$(echo "$TS_DATA" | jq '[.[] | select(.Name == "TypeScript" or .Name == "TypeScript JSX")] | map(.Code) | add // 0')
          TS_COMPLEXITY=$(echo "$TS_DATA" | jq '[.[] | select(.Name == "TypeScript" or .Name == "TypeScript JSX")] | map(.Complexity) | add // 0')
          
          if [ "$TS_LOC" -lt 2000 ]; then TS_LOC_COL="brightgreen";
          elif [ "$TS_LOC" -lt 5000 ]; then TS_LOC_COL="green";
          elif [ "$TS_LOC" -lt 10000 ]; then TS_LOC_COL="yellowgreen";
          else TS_LOC_COL="yellow"; fi
          
          if [ "$TS_COMPLEXITY" -lt 50 ]; then TS_CX_COL="brightgreen";
          elif [ "$TS_COMPLEXITY" -lt 150 ]; then TS_CX_COL="green";
          elif [ "$TS_COMPLEXITY" -lt 300 ]; then TS_CX_COL="yellowgreen";
          else TS_CX_COL="yellow"; fi
          
          echo "{\"schemaVersion\":1,\"label\":\"loc\",\"message\":\"$TS_LOC\",\"color\":\"$TS_LOC_COL\"}" > badges/ts-loc.json
          echo "{\"schemaVersion\":1,\"label\":\"complexity\",\"message\":\"$TS_COMPLEXITY\",\"color\":\"$TS_CX_COL\"}" > badges/ts-complexity.json
          echo "Web UI: $TS_LOC loc, $TS_COMPLEXITY complexity"
          
          echo "Generated release badges:"
          ls -la badges/

      - name: Deploy to badges branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          publish_branch: badges
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update release badges [skip ci] ${{ github.event.workflow_run.head_sha }}'
