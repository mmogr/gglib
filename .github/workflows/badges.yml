name: Update Badges

on:
  workflow_run:
    workflows: ["CI", "Coverage", "Release"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  update-badges:
    name: Update Badges
    runs-on: ubuntu-latest
    # Run on both success and failure to update badges accordingly
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download artifact from triggering workflow
        id: download
        run: |
          mkdir -p artifacts
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          
          echo "Triggered by: $WORKFLOW_NAME (Run ID: $RUN_ID, Conclusion: $CONCLUSION)"
          echo "workflow_name=$WORKFLOW_NAME" >> $GITHUB_OUTPUT
          echo "conclusion=$CONCLUSION" >> $GITHUB_OUTPUT
          
          # Download artifact based on which workflow triggered us
          if [ "$WORKFLOW_NAME" == "CI" ]; then
            echo "Downloading test-results artifact from CI workflow..."
            gh run download $RUN_ID --name test-results --dir artifacts || echo "No test-results artifact found"
          elif [ "$WORKFLOW_NAME" == "Coverage" ]; then
            echo "Downloading coverage-report artifact from Coverage workflow..."
            gh run download $RUN_ID --name coverage-report --dir artifacts || echo "No coverage-report artifact found"
          elif [ "$WORKFLOW_NAME" == "Release" ]; then
            echo "Release workflow - only updating version badge"
          fi
          
          # List what we downloaded
          echo "Downloaded artifacts:"
          find artifacts -type f 2>/dev/null || echo "No files found"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Badge Data
        id: badges
        run: |
          mkdir -p badges
          WORKFLOW_NAME="${{ steps.download.outputs.workflow_name }}"
          CONCLUSION="${{ steps.download.outputs.conclusion }}"
          
          # --- VERSION (always update) ---
          VERSION=$(grep '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "Detected version: $VERSION"
          
          cat <<JSON > badges/version.json
          {
            "schemaVersion": 1,
            "label": "version",
            "message": "v$VERSION",
            "color": "blue"
          }
          JSON
          
          # --- RUST TESTS ---
          # Skip test/coverage updates for Release workflow to preserve existing values
          if [ "$WORKFLOW_NAME" == "Release" ]; then
            echo "Skipping test/coverage badge updates for Release workflow"
          else
          # Parse from artifact if available, otherwise show workflow status
          RUST_TEST_FILE=$(find artifacts -name "rust-test-output.txt" -type f 2>/dev/null | head -1)
          
          if [ -n "$RUST_TEST_FILE" ] && [ -f "$RUST_TEST_FILE" ]; then
            echo "Parsing Rust test results from: $RUST_TEST_FILE"
            PASSED=$(grep -o "test result: ok\. [0-9]* passed" "$RUST_TEST_FILE" | grep -o "[0-9]*" | awk '{sum += $1} END {print sum+0}')
            FAILED=$(grep -o "[0-9]* failed" "$RUST_TEST_FILE" | grep -o "[0-9]*" | awk '{sum += $1} END {print sum+0}')
            TOTAL=$((PASSED + FAILED))
            
            if [ "$TOTAL" -eq 0 ]; then 
              # Check if workflow failed
              if [ "$CONCLUSION" == "failure" ]; then
                MESSAGE="failed"
                COLOR="red"
              else
                MESSAGE="0/0"
                COLOR="yellow"
              fi
            else
              PERCENTAGE=$((PASSED * 100 / TOTAL))
              MESSAGE="$PASSED/$TOTAL ($PERCENTAGE%)"
              
              if [ "$PERCENTAGE" -eq 100 ]; then COLOR="brightgreen";
              elif [ "$PERCENTAGE" -gt 90 ]; then COLOR="green";
              elif [ "$PERCENTAGE" -gt 80 ]; then COLOR="yellowgreen";
              elif [ "$PERCENTAGE" -gt 60 ]; then COLOR="yellow";
              else COLOR="red"; fi
            fi
          elif [ "$CONCLUSION" == "failure" ]; then
            MESSAGE="failed"
            COLOR="red"
          else
            # No artifact and not failed - keep existing or show unknown
            MESSAGE="unknown"
            COLOR="lightgrey"
          fi
          
          cat <<JSON > badges/tests.json
          {
            "schemaVersion": 1,
            "label": "Rust tests",
            "message": "$MESSAGE",
            "color": "$COLOR"
          }
          JSON

          # --- PER-CRATE RUST TESTS ---
          # Generate badges for each workspace crate
          for CRATE in gglib-core gglib-db gglib-cli gglib-axum gglib-tauri; do
            CRATE_TEST_FILE=$(find artifacts -name "rust-test-$CRATE.txt" -type f 2>/dev/null | head -1)
            
            if [ -n "$CRATE_TEST_FILE" ] && [ -f "$CRATE_TEST_FILE" ]; then
              echo "Parsing $CRATE test results from: $CRATE_TEST_FILE"
              CRATE_PASSED=$(grep -o "test result: ok\. [0-9]* passed" "$CRATE_TEST_FILE" | grep -o "[0-9]*" | awk '{sum += $1} END {print sum+0}')
              CRATE_FAILED=$(grep -o "[0-9]* failed" "$CRATE_TEST_FILE" | grep -o "[0-9]*" | awk '{sum += $1} END {print sum+0}')
              CRATE_TOTAL=$((CRATE_PASSED + CRATE_FAILED))
              
              if [ "$CRATE_TOTAL" -eq 0 ]; then
                CRATE_MESSAGE="0/0"
                CRATE_COLOR="yellow"
              else
                CRATE_PERCENTAGE=$((CRATE_PASSED * 100 / CRATE_TOTAL))
                CRATE_MESSAGE="$CRATE_PASSED/$CRATE_TOTAL"
                
                if [ "$CRATE_PERCENTAGE" -eq 100 ]; then CRATE_COLOR="brightgreen";
                elif [ "$CRATE_PERCENTAGE" -gt 90 ]; then CRATE_COLOR="green";
                elif [ "$CRATE_PERCENTAGE" -gt 80 ]; then CRATE_COLOR="yellowgreen";
                elif [ "$CRATE_PERCENTAGE" -gt 60 ]; then CRATE_COLOR="yellow";
                else CRATE_COLOR="red"; fi
              fi
            else
              CRATE_MESSAGE="unknown"
              CRATE_COLOR="lightgrey"
            fi
            
            cat <<JSON > badges/$CRATE-tests.json
          {
            "schemaVersion": 1,
            "label": "$CRATE",
            "message": "$CRATE_MESSAGE",
            "color": "$CRATE_COLOR"
          }
          JSON
          done

          # --- BOUNDARY CHECK ---
          BOUNDARY_FILE=$(find artifacts -name "boundary-status.json" -type f 2>/dev/null | head -1)
          
          if [ -n "$BOUNDARY_FILE" ] && [ -f "$BOUNDARY_FILE" ]; then
            echo "Parsing boundary check results from: $BOUNDARY_FILE"
            BOUNDARY_OVERALL=$(jq -r '.overall // "unknown"' "$BOUNDARY_FILE" 2>/dev/null || echo "unknown")
            
            if [ "$BOUNDARY_OVERALL" == "pass" ]; then
              BOUNDARY_MESSAGE="✓ clean"
              BOUNDARY_COLOR="brightgreen"
            elif [ "$BOUNDARY_OVERALL" == "fail" ]; then
              BOUNDARY_MESSAGE="✗ violation"
              BOUNDARY_COLOR="red"
            else
              BOUNDARY_MESSAGE="unknown"
              BOUNDARY_COLOR="lightgrey"
            fi
          elif [ "$CONCLUSION" == "failure" ]; then
            BOUNDARY_MESSAGE="failed"
            BOUNDARY_COLOR="red"
          else
            BOUNDARY_MESSAGE="unknown"
            BOUNDARY_COLOR="lightgrey"
          fi
          
          cat <<JSON > badges/boundary.json
          {
            "schemaVersion": 1,
            "label": "boundaries",
            "message": "$BOUNDARY_MESSAGE",
            "color": "$BOUNDARY_COLOR"
          }
          JSON

          # --- RUST COVERAGE ---
          LCOV_FILE=$(find artifacts -name "lcov.info" -type f 2>/dev/null | head -1)
          
          if [ -n "$LCOV_FILE" ] && [ -f "$LCOV_FILE" ]; then
            echo "Parsing Rust coverage from: $LCOV_FILE"
            TOTAL_LINES=$(grep -h '^LF:' "$LCOV_FILE" | awk -F ':' '{sum += $2} END {print sum+0}')
            COVERED_LINES=$(grep -h '^LH:' "$LCOV_FILE" | awk -F ':' '{sum += $2} END {print sum+0}')
            
            if [ "$TOTAL_LINES" -gt 0 ]; then
              COVERAGE=$(awk -v covered="$COVERED_LINES" -v total="$TOTAL_LINES" 'BEGIN { printf "%d", (covered / total) * 100 }')
              MESSAGE="$COVERAGE%"
              
              if [ "$COVERAGE" -gt 90 ]; then COLOR="brightgreen";
              elif [ "$COVERAGE" -gt 80 ]; then COLOR="green";
              elif [ "$COVERAGE" -gt 70 ]; then COLOR="yellowgreen";
              elif [ "$COVERAGE" -gt 60 ]; then COLOR="yellow";
              else COLOR="red"; fi
            else
              MESSAGE="0%"
              COLOR="red"
            fi
          elif [ "$WORKFLOW_NAME" == "Coverage" ] && [ "$CONCLUSION" == "failure" ]; then
            MESSAGE="failed"
            COLOR="red"
          else
            MESSAGE="unknown"
            COLOR="lightgrey"
          fi
          
          cat <<JSON > badges/coverage.json
          {
            "schemaVersion": 1,
            "label": "Rust coverage",
            "message": "$MESSAGE",
            "color": "$COLOR"
          }
          JSON

          # --- PER-CRATE RUST COVERAGE ---
          for CRATE in gglib-core gglib-db gglib-cli gglib-axum gglib-tauri; do
            CRATE_LCOV_FILE=$(find artifacts -name "$CRATE-lcov.info" -type f 2>/dev/null | head -1)
            
            if [ -n "$CRATE_LCOV_FILE" ] && [ -f "$CRATE_LCOV_FILE" ]; then
              echo "Parsing $CRATE coverage from: $CRATE_LCOV_FILE"
              CRATE_TOTAL_LINES=$(grep -h '^LF:' "$CRATE_LCOV_FILE" | awk -F ':' '{sum += $2} END {print sum+0}')
              CRATE_COVERED_LINES=$(grep -h '^LH:' "$CRATE_LCOV_FILE" | awk -F ':' '{sum += $2} END {print sum+0}')
              
              if [ "$CRATE_TOTAL_LINES" -gt 0 ]; then
                CRATE_COVERAGE=$(awk -v covered="$CRATE_COVERED_LINES" -v total="$CRATE_TOTAL_LINES" 'BEGIN { printf "%d", (covered / total) * 100 }')
                CRATE_COV_MESSAGE="$CRATE_COVERAGE%"
                
                if [ "$CRATE_COVERAGE" -gt 90 ]; then CRATE_COV_COLOR="brightgreen";
                elif [ "$CRATE_COVERAGE" -gt 80 ]; then CRATE_COV_COLOR="green";
                elif [ "$CRATE_COVERAGE" -gt 70 ]; then CRATE_COV_COLOR="yellowgreen";
                elif [ "$CRATE_COVERAGE" -gt 60 ]; then CRATE_COV_COLOR="yellow";
                else CRATE_COV_COLOR="red"; fi
              else
                CRATE_COV_MESSAGE="0%"
                CRATE_COV_COLOR="red"
              fi
            else
              CRATE_COV_MESSAGE="unknown"
              CRATE_COV_COLOR="lightgrey"
            fi
            
            cat <<JSON > badges/$CRATE-coverage.json
          {
            "schemaVersion": 1,
            "label": "$CRATE cov",
            "message": "$CRATE_COV_MESSAGE",
            "color": "$CRATE_COV_COLOR"
          }
          JSON
          done

          # --- TYPESCRIPT TESTS ---
          # Try JSON file first (more reliable), fall back to text output
          TS_JSON_FILE=$(find artifacts -name "ts-test-results.json" -type f 2>/dev/null | head -1)
          TS_TEXT_FILE=$(find artifacts -name "ts-test-output.txt" -type f 2>/dev/null | head -1)
          
          if [ -n "$TS_JSON_FILE" ] && [ -f "$TS_JSON_FILE" ]; then
            echo "Parsing TS test results from JSON: $TS_JSON_FILE"
            TS_PASSED=$(jq -r '.numPassedTests // 0' "$TS_JSON_FILE" 2>/dev/null || echo "0")
            TS_FAILED=$(jq -r '.numFailedTests // 0' "$TS_JSON_FILE" 2>/dev/null || echo "0")
            TS_TOTAL=$(jq -r '.numTotalTests // 0' "$TS_JSON_FILE" 2>/dev/null || echo "0")
          elif [ -n "$TS_TEXT_FILE" ] && [ -f "$TS_TEXT_FILE" ]; then
            echo "Parsing TS test results from text: $TS_TEXT_FILE"
            # Parse the summary line: "Tests  90 passed | 2 failed (92)" or "Tests  90 passed (90)"
            TS_PASSED=$(grep -E "Tests\s+[0-9]+ passed" "$TS_TEXT_FILE" | grep -oE "[0-9]+ passed" | grep -oE "[0-9]+" | tail -1 || echo "0")
            TS_FAILED=$(grep -E "[0-9]+ failed" "$TS_TEXT_FILE" | grep -oE "[0-9]+ failed" | grep -oE "[0-9]+" | tail -1 || echo "0")
            TS_TOTAL=$((TS_PASSED + TS_FAILED))
          else
            TS_PASSED=0
            TS_FAILED=0
            TS_TOTAL=0
          fi
          
          # Ensure we have valid numbers
          TS_PASSED=${TS_PASSED:-0}
          TS_FAILED=${TS_FAILED:-0}
          TS_TOTAL=${TS_TOTAL:-0}
          
          if [ "$TS_TOTAL" -eq 0 ]; then
            if [ "$CONCLUSION" == "failure" ]; then
              TS_MESSAGE="failed"
              TS_COLOR="red"
            else
              TS_MESSAGE="unknown"
              TS_COLOR="lightgrey"
            fi
          else
            TS_PERCENTAGE=$((TS_PASSED * 100 / TS_TOTAL))
            TS_MESSAGE="$TS_PASSED/$TS_TOTAL ($TS_PERCENTAGE%)"
            
            if [ "$TS_PERCENTAGE" -eq 100 ]; then TS_COLOR="brightgreen";
            elif [ "$TS_PERCENTAGE" -gt 90 ]; then TS_COLOR="green";
            elif [ "$TS_PERCENTAGE" -gt 80 ]; then TS_COLOR="yellowgreen";
            elif [ "$TS_PERCENTAGE" -gt 60 ]; then TS_COLOR="yellow";
            else TS_COLOR="red"; fi
          fi
          
          cat <<JSON > badges/ts-tests.json
          {
            "schemaVersion": 1,
            "label": "TS tests",
            "message": "$TS_MESSAGE",
            "color": "$TS_COLOR"
          }
          JSON

          # --- TYPESCRIPT COVERAGE ---
          # Look for coverage-summary.json in various possible locations
          TS_COV_FILE=$(find artifacts -name "coverage-summary.json" -type f 2>/dev/null | head -1)
          
          if [ -n "$TS_COV_FILE" ] && [ -f "$TS_COV_FILE" ]; then
            echo "Parsing TS coverage from: $TS_COV_FILE"
            TS_COVERAGE=$(jq -r '.total.lines.pct // 0' "$TS_COV_FILE" 2>/dev/null || echo "0")
            # Round to integer
            TS_COVERAGE=$(printf "%.0f" "$TS_COVERAGE" 2>/dev/null || echo "0")
            
            if [ "$TS_COVERAGE" -gt 90 ]; then TS_COV_COLOR="brightgreen";
            elif [ "$TS_COVERAGE" -gt 80 ]; then TS_COV_COLOR="green";
            elif [ "$TS_COVERAGE" -gt 70 ]; then TS_COV_COLOR="yellowgreen";
            elif [ "$TS_COVERAGE" -gt 60 ]; then TS_COV_COLOR="yellow";
            else TS_COV_COLOR="red"; fi
            
            TS_COV_MESSAGE="$TS_COVERAGE%"
          elif [ "$WORKFLOW_NAME" == "Coverage" ] && [ "$CONCLUSION" == "failure" ]; then
            TS_COV_MESSAGE="failed"
            TS_COV_COLOR="red"
          else
            TS_COV_MESSAGE="unknown"
            TS_COV_COLOR="lightgrey"
          fi
          
          cat <<JSON > badges/ts-coverage.json
          {
            "schemaVersion": 1,
            "label": "TS coverage",
            "message": "$TS_COV_MESSAGE",
            "color": "$TS_COV_COLOR"
          }
          JSON
          fi  # End of Release workflow skip
          
          echo "Generated badges:"
          cat badges/*.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SCC badges only update on Release (LOC/complexity don't change often)
      - name: Install scc
        if: steps.download.outputs.workflow_name == 'Release'
        run: |
          curl -sL https://github.com/boyter/scc/releases/download/v3.2.0/scc_Linux_x86_64.tar.gz | tar xz
          chmod +x scc
          sudo mv scc /usr/local/bin/

      - name: Generate SCC complexity badges
        if: steps.download.outputs.workflow_name == 'Release'
        run: |
          # Generate per-crate LOC and complexity badges
          for CRATE in gglib-core gglib-db gglib-cli gglib-axum gglib-tauri; do
            if [ -d "crates/$CRATE" ]; then
              # Get Rust lines of code and complexity
              SCC_DATA=$(scc crates/$CRATE --format json 2>/dev/null | jq '[.[] | select(.Name == "Rust")] | .[0] // {Code: 0, Complexity: 0}')
              LOC=$(echo "$SCC_DATA" | jq '.Code // 0')
              COMPLEXITY=$(echo "$SCC_DATA" | jq '.Complexity // 0')
              
              # LOC color (smaller is better for focused crates)
              if [ "$LOC" -lt 200 ]; then LOC_COLOR="brightgreen";
              elif [ "$LOC" -lt 500 ]; then LOC_COLOR="green";
              elif [ "$LOC" -lt 1000 ]; then LOC_COLOR="yellowgreen";
              elif [ "$LOC" -lt 2000 ]; then LOC_COLOR="yellow";
              else LOC_COLOR="orange"; fi
              
              # Complexity color (lower is better)
              if [ "$COMPLEXITY" -lt 10 ]; then CX_COLOR="brightgreen";
              elif [ "$COMPLEXITY" -lt 25 ]; then CX_COLOR="green";
              elif [ "$COMPLEXITY" -lt 50 ]; then CX_COLOR="yellowgreen";
              elif [ "$COMPLEXITY" -lt 100 ]; then CX_COLOR="yellow";
              else CX_COLOR="orange"; fi
              
              cat <<JSON > badges/$CRATE-loc.json
          {
            "schemaVersion": 1,
            "label": "loc",
            "message": "$LOC",
            "color": "$LOC_COLOR"
          }
          JSON
              
              cat <<JSON > badges/$CRATE-complexity.json
          {
            "schemaVersion": 1,
            "label": "complexity",
            "message": "$COMPLEXITY",
            "color": "$CX_COLOR"
          }
          JSON
              echo "$CRATE: $LOC loc, $COMPLEXITY complexity"
            fi
          done
          
          # TypeScript LOC and complexity for Web UI
          TS_DATA=$(scc src --include-ext ts,tsx --format json 2>/dev/null)
          TS_LOC=$(echo "$TS_DATA" | jq '[.[] | select(.Name == "TypeScript" or .Name == "TypeScript JSX")] | map(.Code) | add // 0')
          TS_COMPLEXITY=$(echo "$TS_DATA" | jq '[.[] | select(.Name == "TypeScript" or .Name == "TypeScript JSX")] | map(.Complexity) | add // 0')
          
          if [ "$TS_LOC" -lt 2000 ]; then TS_LOC_COLOR="brightgreen";
          elif [ "$TS_LOC" -lt 5000 ]; then TS_LOC_COLOR="green";
          elif [ "$TS_LOC" -lt 10000 ]; then TS_LOC_COLOR="yellowgreen";
          else TS_LOC_COLOR="yellow"; fi
          
          if [ "$TS_COMPLEXITY" -lt 50 ]; then TS_CX_COLOR="brightgreen";
          elif [ "$TS_COMPLEXITY" -lt 150 ]; then TS_CX_COLOR="green";
          elif [ "$TS_COMPLEXITY" -lt 300 ]; then TS_CX_COLOR="yellowgreen";
          else TS_CX_COLOR="yellow"; fi
          
          cat <<JSON > badges/ts-loc.json
          {
            "schemaVersion": 1,
            "label": "loc",
            "message": "$TS_LOC",
            "color": "$TS_LOC_COLOR"
          }
          JSON
          
          cat <<JSON > badges/ts-complexity.json
          {
            "schemaVersion": 1,
            "label": "complexity",
            "message": "$TS_COMPLEXITY",
            "color": "$TS_CX_COLOR"
          }
          JSON
          echo "Web UI: $TS_LOC loc, $TS_COMPLEXITY complexity"

      - name: Deploy to badges branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          publish_branch: badges
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update badges [skip ci]'
