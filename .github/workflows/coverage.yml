name: Coverage

on:
  push:
    branches: [main]

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RUSTFLAGS: "-C relocation-model=dynamic-no-pic"
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo registry and target directory
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y bc libasound2-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Web UI
        run: |
          npm install
          npm run build

      - name: Run Rust tests with coverage
        run: |
          cargo llvm-cov \
            -p gglib-core \
            -p gglib-db \
            -p gglib-gguf \
            -p gglib-hf \
            -p gglib-download \
            -p gglib-mcp \
            -p gglib-agent \
            -p gglib-proxy \
            -p gglib-runtime \
            -p gglib-app-services \
            -p gglib-bootstrap \
            -p gglib-cli \
            -p gglib-axum \
            --lcov --output-path lcov.info 2>&1 | tee rust-test-output.txt

      - name: Run per-crate Rust coverage
        run: |
          # Use `cargo llvm-cov report` (report-only subcommand) to slice per-package
          # lcov files from the profdata already collected in the combined step above.
          # This does NOT recompile or relink anything — it just re-processes the
          # existing profdata + instrumented binaries.
          #
          # NOTE: `report` does NOT accept --all-features (it's a report-only
          # subcommand that doesn't invoke cargo build).
          cargo llvm-cov report --package gglib-core --lcov --output-path gglib-core-lcov.info
          cargo llvm-cov report --package gglib-db --lcov --output-path gglib-db-lcov.info
          cargo llvm-cov report --package gglib-gguf --lcov --output-path gglib-gguf-lcov.info
          cargo llvm-cov report --package gglib-hf --lcov --output-path gglib-hf-lcov.info
          cargo llvm-cov report --package gglib-download --lcov --output-path gglib-download-lcov.info
          cargo llvm-cov report --package gglib-mcp --lcov --output-path gglib-mcp-lcov.info
          cargo llvm-cov report --package gglib-agent --lcov --output-path gglib-agent-lcov.info
          cargo llvm-cov report --package gglib-proxy --lcov --output-path gglib-proxy-lcov.info
          cargo llvm-cov report --package gglib-runtime --lcov --output-path gglib-runtime-lcov.info
          cargo llvm-cov report --package gglib-app-services --lcov --output-path gglib-app-services-lcov.info
          cargo llvm-cov report --package gglib-bootstrap --lcov --output-path gglib-bootstrap-lcov.info
          cargo llvm-cov report --package gglib-cli --lcov --output-path gglib-cli-lcov.info
          cargo llvm-cov report --package gglib-axum --lcov --output-path gglib-axum-lcov.info

      - name: Run TypeScript tests with coverage
        run: npm run test:coverage -- --reporter=json --reporter=default --outputFile=ts-test-results.json 2>&1 | tee ts-test-output.txt

      - name: Generate HTML report
        run: |
          cargo llvm-cov report \
            --package gglib-core \
            --package gglib-db \
            --package gglib-gguf \
            --package gglib-hf \
            --package gglib-download \
            --package gglib-mcp \
            --package gglib-agent \
            --package gglib-proxy \
            --package gglib-runtime \
            --package gglib-app-services \
            --package gglib-bootstrap \
            --package gglib-cli \
            --package gglib-axum \
            --html

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            target/llvm-cov/html/
            lcov.info
            gglib-core-lcov.info
            gglib-db-lcov.info
            gglib-gguf-lcov.info
            gglib-hf-lcov.info
            gglib-download-lcov.info
            gglib-mcp-lcov.info
            gglib-agent-lcov.info
            gglib-proxy-lcov.info
            gglib-runtime-lcov.info
            gglib-app-services-lcov.info
            gglib-bootstrap-lcov.info
            gglib-cli-lcov.info
            gglib-axum-lcov.info
            coverage/
            rust-test-output.txt
            ts-test-output.txt
            ts-test-results.json
          retention-days: 30
