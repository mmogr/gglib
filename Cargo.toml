[package]
name = "gglib"
version = "1.1.2"
authors = ["mmogr"]
edition = "2024"
description = "GGUF model manager and runner"
repository = "https://github.com/mmogr/gglib"
license = "MIT"

[dependencies]
clap = { version = "4.0", features = ["derive"] }
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "chrono"] }
libsqlite3-sys = { version = "0.27", features = ["bundled", "unlock_notify"] }
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.11", features = ["json", "stream"] }
url = "2.5"
hf-hub = "0.4"
indicatif = "0.17"
regex = "1.0"
urlencoding = "2.1"
num_cpus = "1.16"
dotenvy = "0.15"
thiserror = "1.0"
# Proxy server dependencies
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace", "fs"] }
hyper = { version = "1.0", features = ["client", "http1", "http2"] }
hyper-util = { version = "0.1", features = ["client-legacy", "http1", "http2", "tokio"] }
http-body-util = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = "1.5"
sysinfo = "0.36.1"
dirs = "6.0.0"
futures-util = "0.3"
tokio-stream = { version = "0.1.17", features = ["sync"] }
which = "5.0"
tokio-util = "0.7"
zip = "2.2"
uuid = { version = "1.18.1", features = ["v4"] }

# Platform-specific process termination for graceful shutdown
[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", features = ["signal"] }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = ["Win32_Foundation", "Win32_System_Threading"] }

[build-dependencies]
regex = "1.10"

[dev-dependencies]
tempfile = "3.8"
tokio-test = "0.4"
mockall = "0.12"

[profile.release]
opt-level = 2
lto = "thin"
codegen-units = 16
