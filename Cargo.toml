[workspace]
resolver = "2"
members = [
    "crates/gglib-core",
    "crates/gglib-db",
    "crates/gglib-cli",
    "crates/gglib-axum",
    "crates/gglib-tauri",
    # Legacy monolith - will be removed after extraction complete
    # ".",
]

# Shared package metadata for all workspace crates
[workspace.package]
version = "1.5.3"
edition = "2024"
license = "MIT"
repository = "https://github.com/mmogr/gglib"
authors = ["mmogr"]

# Workspace-wide dependencies: ONLY truly universal crates
# Adapter-specific deps (sqlx, clap, tauri, axum) are defined locally per crate
[workspace.dependencies]
# Async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-test = "0.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Logging/tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async traits
async-trait = "0.1.89"

# Testing
tempfile = "3.8"
mockall = "0.12"

# Workspace-wide lints for consistency
[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
# Allow these common patterns
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"

# Profile settings apply to all workspace members
[profile.release]
opt-level = 2
lto = "thin"
codegen-units = 16

[profile.dev]
opt-level = 0

[profile.test]
opt-level = 0
