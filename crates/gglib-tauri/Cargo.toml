[package]
name = "gglib-tauri"
version = "0.1.0"
edition = "2024"
description = "Tauri GUI backend adapter for gglib"
license = "MIT"
publish = false

[lib]
name = "gglib_tauri"
path = "src/lib.rs"

[dependencies]
gglib-core = { path = "../gglib-core" }
gglib-db = { path = "../gglib-db" }

# Universal dependencies
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }

# Tauri-specific dependencies - defined locally, not in workspace
# Note: tauri version should match src-tauri/Cargo.toml
# tauri = "2.x"

[dev-dependencies]
tokio-test = { workspace = true }

[lints.rust]
unsafe_code = "deny"
