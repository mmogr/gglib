[package]
name = "gglib-agent"
version.workspace = true
edition.workspace = true
description = "Pure-domain agentic loop implementation for gglib"
license.workspace = true
publish = false

[lib]
name = "gglib_agent"
path = "src/lib.rs"

[dependencies]
# Domain types and port traits — the ONLY workspace crate this crate depends on.
# Hexagonal boundary: gglib-agent must not reference any infrastructure crate.
gglib-core   = { path = "../gglib-core" }
tokio        = { workspace = true }
futures-util = { workspace = true }
futures-core = { workspace = true }
async-trait  = { workspace = true }
anyhow       = { workspace = true }
tracing      = { workspace = true }
serde_json   = { workspace = true }

[lints]
workspace = true
