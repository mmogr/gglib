[package]
name = "gglib-cli"
version = "0.1.0"
edition = "2024"
description = "CLI interface for gglib"
license = "MIT"
publish = false

[[bin]]
name = "gglib"
path = "src/main.rs"

[dependencies]
gglib-core = { path = "../gglib-core" }
gglib-db = { path = "../gglib-db" }

# CLI-specific dependencies - defined locally, not in workspace
clap = { version = "4.0", features = ["derive"] }
thiserror = { workspace = true }

# These will be used as command handlers are migrated
# tokio = { workspace = true }
# serde = { workspace = true }
# serde_json = { workspace = true }
# tracing = { workspace = true }
# tracing-subscriber = { workspace = true }
# anyhow = { workspace = true }
# indicatif = "0.17"
# dotenvy = "0.15"

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = { workspace = true }

[lints.rust]
unsafe_code = "deny"
